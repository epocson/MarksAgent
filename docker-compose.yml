version: '3.8'

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  marks_agent:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=data/students_profiles.db
    volumes:
      - ./data:/app/data

  tutor_agent:
    build: .
    depends_on:
      - redis
    command: python tutor_agent.py
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # host.docker.internal нужен, чтобы контейнер достучался до Ollama на хосте Mac
      - LLM_BASE_URL=http://host.docker.internal:11434/v1
      - LLM_MODEL=llama3
      - LLM_API_KEY=ollama
