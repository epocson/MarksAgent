services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./backend
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/students_profiles.db
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api-gateway

  marks-agent:
    build:
      context: ./backend
      dockerfile: ./marks_agent_service/Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/students_profiles.db
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - redis

  tutor-agent:
    build:
      context: ./backend
      dockerfile: ./tutorial_agent_new/Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
