build-and-publish:
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg TOKEN="${CI_JOB_TOKEN}" -t ${CI_REGISTRY_IMAGE}:latest .
    - docker push ${CI_REGISTRY_IMAGE}:latest
    - docker image prune -f
  only:
    - main
  tags:
    - peai-admin-server