workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - when: never

build-and-publish:
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg TOKEN="${CI_JOB_TOKEN}" -t ${CI_REGISTRY_IMAGE}:latest .
    - docker push ${CI_REGISTRY_IMAGE}:latest
    - docker image prune -f
  tags:
    - peai-admin-server
  artifacts:
    untracked: true
    name: requirements.txt
    paths:
      - ./requirements.txt
    when: on_failure
    access: all
    expire_in: 30 days